<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ITI Admission Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-container {
            background: rgba(255, 255, 255, 1);
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 15px 25px rgba(0,0,0,0.2);
            width: 400px;
            text-align: center;
        }

        .login-container h2 {
            color: #1e3c72;
            margin-bottom: 10px;
            font-size: 24px;
        }

        .login-container p {
            color: #666;
            font-size: 14px;
            margin-bottom: 30px;
        }

        .input-group {
            text-align: left;
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            font-weight: bold;
            margin-bottom: 5px;
            color: #333;
        }

        .input-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            outline: none;
            transition: 0.3s;
        }

        .input-group input:focus {
            border-color: #1e3c72;
            box-shadow: 0 0 5px rgba(30, 60, 114, 0.3);
        }

        .login-btn {
            width: 100%;
            padding: 12px;
            background: #ff6f00; /* Orange color for action */
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .login-btn:hover {
            background: #e65100;
        }

        .links {
            margin-top: 20px;
            font-size: 13px;
        }

        .links a {
            color: #1e3c72;
            text-decoration: none;
            margin: 0 10px;
        }

        .links a:hover {
            text-decoration: underline;
        }

        .footer-logo {
            margin-top: 20px;
            font-weight: bold;
            color: #1e3c72;
            border-top: 1px solid #eee;
            padding-top: 15px;
        }
    </style>
</head>
<body>

    <div class="login-container">
        <h2> Govt. ITI Santor Admission Portal</h2>
        <p>Apna Registration Number aur Password enter karein !</p>

        <form action="#">
            <div class="input-group">
                <label>Registration No. / Email</label>
                <input type="text" placeholder="Enter Registration No." required>
            </div>

            <div class="input-group">
                <label>Password</label>
                <input type="password" placeholder="Enter Password" required>
            </div>

            <button type="submit" class="login-btn">LOGIN</button>
        </form>

        <div class="links">
            <a href="#"> Forgot Password ?</a> | 
            <a href="#">New Registration </a>
        </div>

        <div class="footer-logo">
            <a href="index.html"><small>Government ITI Santor Admission 2026</small></a>
        </div>
    </div>

</body>
</html>
